<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ThalassemiaAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-page" data-theme="dark">

  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <div class="auth-card">

    <a href="../index.html" class="auth-logo">
      <span class="logo-dot"></span>
      ThalassemiaAI
    </a>

    <div class="auth-head">
      <h1>Create account</h1>
      <p>Start analysing blood tests with AI</p>
    </div>

    <div id="alertBox"></div>

    <form id="registerForm" class="auth-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="fullName">Full Name</label>
        <input
          type="text"
          id="fullName"
          class="form-input"
          placeholder="Your full name"
          autocomplete="name"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Min. 6 characters"
            autocomplete="new-password"
            required
          />
          <button type="button" class="show-pass-btn" id="togglePass" aria-label="Toggle password">
            <span id="eyeIcon">👁</span>
          </button>
        </div>
        <span class="form-hint">At least 6 characters</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
        Create Account
      </button>
    </form>

    <p class="auth-footer-text">
      Already have an account? <a href="login.html">Sign in</a>
    </p>

  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initTheme();

      // Redirect if already logged in
      await requireGuest();

      const form = document.getElementById('registerForm');
      const toggleBtn = document.getElementById('togglePass');
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');

      toggleBtn.addEventListener('click', () => {
        const isText = passwordInput.type === 'text';
        passwordInput.type = isText ? 'password' : 'text';
        eyeIcon.textContent = isText ? '👁' : '🙈';
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('alertBox');

        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!fullName || !email || !password) {
          showAlert('alertBox', 'error', 'All fields are required.');
          return;
        }
        if (password.length < 6) {
          showAlert('alertBox', 'error', 'Password must be at least 6 characters.');
          return;
        }

        setLoading('registerBtn', true, 'Creating account…');

        const { data: signUpData, error } = await db.auth.signUp(email, password, fullName);

        setLoading('registerBtn', false);

        if (error) {
          let msg = error.message;
          if (msg.includes('already registered') || msg.includes('already been registered')) {
            msg = 'An account with this email already exists. Please sign in.';
          }
          showAlert('alertBox', 'error', msg);
          return;
        }

        // If email confirmation is enabled, Supabase returns a user but NO session.
        // In that case, tell the user to check their email instead of redirecting.
        if (signUpData?.user && !signUpData?.session) {
          showAlert('alertBox', 'success', 'Account created! Please check your email to confirm your address, then sign in.');
          return;
        }

        // Email confirmation is disabled — session is ready, go straight to dashboard
        showAlert('alertBox', 'success', 'Account created! Redirecting to dashboard…');
        setTimeout(() => {
          goTo('dashboard/index.html');
        }, 1000);
      });
    });
  </script>
</body>
</html>
