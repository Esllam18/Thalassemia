<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ThalassemiaAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-page" data-theme="dark">

  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <div class="auth-card">

    <a href="../index.html" class="auth-logo">
      <span class="logo-dot"></span>
      ThalassemiaAI
    </a>

    <div class="auth-head">
      <h1>Welcome back</h1>
      <p>Sign in to your account to continue</p>
    </div>

    <div id="alertBox"></div>

    <form id="loginForm" class="auth-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="show-pass-btn" id="togglePass" aria-label="Toggle password">
            <span id="eyeIcon">👁</span>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        Sign In
      </button>
    </form>

    <p class="auth-footer-text">
      Don't have an account? <a href="register.html">Create one</a>
    </p>

  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initTheme();

      // Redirect if already logged in
      await requireGuest();

      const form = document.getElementById('loginForm');
      const toggleBtn = document.getElementById('togglePass');
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');

      // Toggle password visibility
      toggleBtn.addEventListener('click', () => {
        const isText = passwordInput.type === 'text';
        passwordInput.type = isText ? 'password' : 'text';
        eyeIcon.textContent = isText ? '👁' : '🙈';
      });

      // Form submit
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlert('alertBox');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          showAlert('alertBox', 'error', 'Please enter your email and password.');
          return;
        }

        setLoading('loginBtn', true, 'Signing in…');

        const { error } = await db.auth.signIn(email, password);

        setLoading('loginBtn', false);

        if (error) {
          let msg = error.message;
          if (msg.includes('Invalid login credentials')) {
            msg = 'Incorrect email or password. Please try again.';
          } else if (msg.includes('Email not confirmed')) {
            msg = 'Please confirm your email address before signing in.';
          }
          showAlert('alertBox', 'error', msg);
          return;
        }

        // Success — go to dashboard
        goTo('dashboard/index.html');
      });
    });
  </script>
</body>
</html>
